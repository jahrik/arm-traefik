---
name: Build

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test building image.
        run: docker build -t test-image .

      - name: Verify the binary works.
        run: docker run --rm test-image version

      - name: Run with the API and verify it responds.
        run: |
          docker run -d --name traefik -p 8080:8080 test-image \
            --api=true --api.insecure=true --providers.docker=false
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:8080/api/version >/dev/null; then
              echo "Traefik is up"; exit 0
            fi
            sleep 5
          done
          docker logs traefik
          exit 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image.
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          push: true
          tags: ${{ github.repository }}:latest
