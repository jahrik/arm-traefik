version: '3'

services:

  traefik:
    image: jahrik/arm-traefik:aarch64
    command: --api --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 8082:8080
      - 80:80
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.arch == aarch64

  whoami:
    deploy:
      replicas: 3
      labels:
        traefik.docker.network: traefik
