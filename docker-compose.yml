---
services:
  traefik:
    image: jahrik/arm-traefik:latest
    command:
      - --api=true
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.domains[0].main=$DOMAINNAME
      - --entrypoints.websecure.http.tls.domains[0].sans=*.$DOMAINNAME
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/12,172.64.0.0/13,131.0.72.0/22
      - --certificatesresolvers.cloudflare.acme.email=$CF_API_EMAIL
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.delaybeforecheck=0
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers[0]=1.1.1.1:53
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers[1]=8.8.8.8:53
      - --certificatesresolvers.cloudflare.acme.caServer=$TRAEFIK_ACME_CASERVER
      - --certificatesresolvers.cloudflare.acme.storage=/acme.json
      - --log=true
      - --log.level=INFO
      - --providers.swarm=true
      - --providers.swarm.network=traefik
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.defaultrule=Host(`{{ index .Labels "com.docker.compose.service" }}.$DOMAINNAME`)

    ports:
      - '8082:8080'
      - '80:80'
      - '443:443'
    networks:
      - traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/g1/traefik/acme.json:/etc/traefik/acme.json
      - /mnt/g1/traefik/rules:/etc/traefik/rules
    environment:
      - CF_API_EMAIL=$CF_API_EMAIL
      - CF_API_KEY=$CF_API_KEY
      - DOMAINNAME=$DOMAINNAME
    deploy:
      placement:
        constraints:
          - node.role == manager

networks:
  traefik:
    name: traefik
    driver: overlay
