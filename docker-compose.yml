version: '3'

services:

  traefik:
    image: jahrik/arm-traefik:aarch64
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8082:8080
      - 80:80
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.arch == aarch64
