version: '3'

services:

  traefik:
    image: jahrik/arm-traefik:aarch64
    command: --api --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 8082:8080
      - 80:80
    networks:
      - traefik-net
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.arch == aarch64

  ghost:
    image: arm64v8/ghost
    ports:
      - 8083:2368
    networks:
      - traefik-net
    deploy:
      replicas: 1
      labels:
        traefik.docker.network: traefik

networks:
  traefik-net:
    driver: overlay
