version: '3.5'

services:

  traefik:
    image: jahrik/arm-traefik:aarch64
    command:
      - "--api"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8082:8080
      - 80:80
    networks:
      - traefik
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.arch == aarch64

  ghost:
    image: arm64v8/ghost
    ports:
      - 8083:2368
    networks:
      - traefik
    deploy:
      replicas: 1
      labels:
        traefik.docker.network: traefik
        traefik.frontend.rule: Host:ghost.homelab.business
      placement:
        constraints:
          - node.labels.arch == aarch64

networks:
  traefik:
    name: traefik
    driver: overlay

